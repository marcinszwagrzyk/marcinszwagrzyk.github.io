<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rock Face – True 3D Mesh z przewieszeniami</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #08090f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #ccc; }
canvas#c { display: block; width: 100vw; height: 100vh; }
.btn {
  position: absolute;
  background: rgba(20,50,100,0.75); border: 1px solid rgba(100,160,255,0.35);
  color: #88ccff; padding: 9px 20px; border-radius: 8px;
  font-size: 11px; letter-spacing: 1.8px; cursor: pointer; text-transform: uppercase;
  backdrop-filter: blur(10px); transition: background 0.15s;
}
.btn:hover { background: rgba(40,80,180,0.85); }
#export-btn { bottom: 16px; right: 16px; }
#load-btn   { bottom: 16px; right: 170px; }
#file-input { display: none; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 15px; color: #666; letter-spacing: 2px; text-align: center; line-height: 1.8; }
#help { position: absolute; bottom: 16px; left: 16px;
  font-size: 10px; color: rgba(255,255,255,0.28); line-height: 2; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">ŁADOWANIE THREE.JS…</div>
<button id="export-btn" class="btn" style="display:none">⬇ Eksport GLB</button>
<button id="load-btn"   class="btn" style="display:none">📂 Wczytaj GLB/OBJ</button>
<input  id="file-input" type="file" accept=".glb,.gltf,.obj">
<div id="help">Lewy: obracanie · Prawy/środkowy: przesuwanie · Scroll: zoom</div>

<script src="lib/three.min.js"></script>
<script src="lib/OrbitControls.js"></script>
<script src="lib/GLTFLoader.js"></script>
<script src="lib/GLTFExporter.js"></script>
<script src="lib/OBJLoader.js"></script>
<script>
window.addEventListener('load', startApp);

// ─────────────────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('loading').textContent = 'GENEROWANIE MESHA…';

  // Daj przeglądarce chwilę na odmalowanie (żeby napis się pojawił)
  setTimeout(buildScene, 50);
}

// ── Noise (tylko 2D, tylko 2 oktawy — szybki) ─────────────────────────────────
function h2(x, y) {
  let n = (((x & 0xfff) * 1619) ^ ((y & 0xfff) * 31337)) >>> 0;
  n = ((n >> 13) ^ n) >>> 0;
  n = (((n * (((n * n * 60493) >>> 0) + 19990303)) >>> 0) + 1376312589) >>> 0;
  return (n & 0xffff) / 65535;
}
function vn2(x, y) {
  const ix=Math.floor(x), iy=Math.floor(y), fx=x-ix, fy=y-iy;
  const u=fx*fx*(3-2*fx), v=fy*fy*(3-2*fy);
  return h2(ix,iy)*(1-u)*(1-v) + h2(ix+1,iy)*u*(1-v)
       + h2(ix,iy+1)*(1-u)*v   + h2(ix+1,iy+1)*u*v;
}
function fbm(x, y) {  // zawsze 2 oktawy
  return 0.667*(vn2(x, y) + 0.5*vn2(x*2.07+31.7, y*2.07+17.3));
}

// ── Profil ściany ─────────────────────────────────────────────────────────────
const PROFILE = [
  [0.00,   0,   0],
  [0.18,  70,   5],
  [0.32, 128,  18],
  [0.47, 195,  62],
  [0.58, 228,  54],
  [0.67, 254,  20],
  [0.75, 276,   1],
  [1.00, 385, -16],
];
function getProfile(t) {
  let i = 0;
  while (i < PROFILE.length-2 && PROFILE[i+1][0] <= t) i++;
  const [t0,y0,z0]=PROFILE[i], [t1,y1,z1]=PROFILE[i+1];
  const s=(t-t0)/(t1-t0), u=s*s*(3-2*s);
  return [y0+(y1-y0)*u, z0+(z1-z0)*u];
}

// ── Budowa mesha ──────────────────────────────────────────────────────────────
const COLS=80, ROWS=110, W=500;

function buildMesh() {
  const nV = (COLS+1)*(ROWS+1);
  const pos = new Float32Array(nV*3);
  const col = new Float32Array(nV*3);
  const uv  = new Float32Array(nV*2);
  const idx = [];

  for (let r=0; r<=ROWS; r++) {
    const t = r/ROWS;
    const [pY, pZ] = getProfile(t);
    const oZone = Math.max(0, Math.sin(Math.max(0, (t-0.28)/0.48)*Math.PI));

    for (let c=0; c<=COLS; c++) {
      const u = c/COLS;
      const x = (u-0.5)*W;
      const colOvhg = (fbm(x*0.0022+2.1, 0.3) - 0.5) * 50;
      const pillarZ = (fbm(x*0.0045, t*3.5+1.7) - 0.5) * 40;
      const pillarX = (fbm(x*0.0045, t*3.5+5.3) - 0.5) * 25;

      const vi = r*(COLS+1)+c;
      pos[vi*3]   = x  + pillarX*0.4;
      pos[vi*3+1] = pY;
      pos[vi*3+2] = pZ + colOvhg*oZone + pillarZ*0.5;

      // kolor elevation
      const tc = (pY-0)/(385-0);
      const gr = 0.28 + tc*0.40;
      col[vi*3]=gr*0.96; col[vi*3+1]=gr*0.94; col[vi*3+2]=gr;

      uv[vi*2]=u; uv[vi*2+1]=t;

      if (r<ROWS && c<COLS) {
        const a=r*(COLS+1)+c, b=a+1, d=a+(COLS+1), e=d+1;
        idx.push(a,d,b, b,d,e);
      }
    }
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  g.setAttribute('uv',       new THREE.BufferAttribute(uv,  2));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}

// ── Scena ─────────────────────────────────────────────────────────────────────
let scene, camera, renderer, controls, mainMesh;

function buildScene() {
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2535);
  scene.fog = new THREE.FogExp2(0x1a2030, 0.00020);

  camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 1, 60000);
  camera.position.set(0, 80, 320);

  scene.add(new THREE.AmbientLight(0x6080a0, 0.9));
  scene.add(new THREE.HemisphereLight(0x90aad0, 0x404030, 0.7));
  const sun = new THREE.DirectionalLight(0xfff5dd, 1.6);
  sun.position.set(-3000, 5000, 4000);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  scene.add(sun);

  const geo = buildMesh();
  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.92, metalness: 0.0
  });
  mainMesh = new THREE.Mesh(geo, mat);
  mainMesh.castShadow = true;
  mainMesh.receiveShadow = true;
  scene.add(mainMesh);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 215, 45);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.update();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('export-btn').style.display = 'block';
  document.getElementById('load-btn').style.display   = 'block';
  document.getElementById('export-btn').addEventListener('click', exportGLB);
  document.getElementById('load-btn').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', onFileSelected);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── GLB export ────────────────────────────────────────────────────────────────
function exportGLB() {
  new THREE.GLTFExporter().parse(
    new THREE.Mesh(mainMesh.geometry, new THREE.MeshStandardMaterial({ vertexColors: true })),
    (glb) => {
      const url = URL.createObjectURL(new Blob([glb], { type: 'application/octet-stream' }));
      Object.assign(document.createElement('a'), { href: url, download: 'zamarla_rock_face.glb' }).click();
      URL.revokeObjectURL(url);
    },
    console.error,
    { binary: true }
  );
}

// ── Wczytaj GLB/OBJ ───────────────────────────────────────────────────────────
function onFileSelected(e) {
  const file = e.target.files[0]; if (!file) return;
  const isGLB = /\.(glb|gltf)$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = (ev) => {
    const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.92 });
    if (isGLB) {
      new THREE.GLTFLoader().parse(ev.target.result, '', (gltf) => swapMesh(gltf.scene, mat), console.error);
    } else {
      swapMesh(new THREE.OBJLoader().parse(ev.target.result), mat);
    }
  };
  isGLB ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
}

function swapMesh(obj, mat) {
  scene.remove(mainMesh);
  obj.traverse(c => { if (c.isMesh) { c.material = mat; c.castShadow = true; } });
  const box = new THREE.Box3().setFromObject(obj);
  const sz  = box.getSize(new THREE.Vector3());
  obj.position.sub(box.getCenter(new THREE.Vector3()));
  obj.position.y += sz.y * 0.5;
  scene.add(obj);
  mainMesh = obj;
  camera.position.set(0, sz.y*0.25, Math.max(sz.x,sz.y,sz.z)*0.9);
  controls.target.set(0, sz.y*0.4, 0);
  controls.update();
}
</script>
</body>
</html>
