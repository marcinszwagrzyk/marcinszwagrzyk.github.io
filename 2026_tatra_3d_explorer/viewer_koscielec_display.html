  background: rgba(255,255,255,0.1); border-radius: 20px; transition: 0.2s; }
.slider-toggle:before { content: ''; position: absolute; height: 14px; width: 14px;

<script>
const STEP = 2;
const LAT = 49.2254, LNG = 20.0155;
let scene, camera, renderer, controls, composer;
let sunLight, ambientLight, sunMesh, sky;
let shaderUniforms = null;
let orthoTex = null;
let meta, physW, physD;
let rawHeights = null;

const MARKER_GEO = new THREE.SphereGeometry(1.5, 8, 6);

// ── Noise ─────────────────────────────────────────────────────────────────────
function h2(x, y) {
  let n=(((x&0xfff)*1619)^((y&0xfff)*31337))>>>0;
  n=((n>>13)^n)>>>0;
  n=(((n*(((n*n*60493)>>>0)+19990303))>>>0)+1376312589)>>>0;
  return (n&0xffff)/65535;
}
function vn2(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  return h2(ix,iy)*(1-u)*(1-v)+h2(ix+1,iy)*u*(1-v)+h2(ix,iy+1)*(1-u)*v+h2(ix+1,iy+1)*u*v;
}
function fbm2(x,y,oct){
  let v=0,a=.5,f=1,s=0;
  for(let o=0;o<oct;o++){v+=a*vn2(x*f+o*31.7,y*f+o*17.3);s+=a;a*=.5;f*=2.07;}
  return v/s;
}

// ── Kolor skały ───────────────────────────────────────────────────────────────
function rockColor(t) {
  if(t<.12){const s=t/.12;return[.18+s*.10,.15+s*.08,.11+s*.06];}
  else if(t<.45){const s=(t-.12)/.33;return[.28+s*.22,.23+s*.18,.18+s*.16];}
  else if(t<.78){const s=(t-.45)/.33;return[.50+s*.18,.41+s*.20,.34+s*.22];}
  else{const s=(t-.78)/.22;return[.68+s*.28,.61+s*.32,.56+s*.36];}
}

// ── Budowa geometrii z DEM PNG ────────────────────────────────────────────────
function buildGeometry(img) {
  const cv=document.createElement('canvas');
  cv.width=img.width;cv.height=img.height;
  cv.getContext('2d').drawImage(img,0,0);
  const px=cv.getContext('2d').getImageData(0,0,img.width,img.height).data;
  const fW=img.width,fH=img.height;
  const cols=Math.floor(fW/STEP),rows=Math.floor(fH/STEP);
  const eMin=meta.elev_min,eMax=meta.elev_max;
  const cellM=physW/(cols-1);
  rawHeights=new Float32Array(cols*rows);
  const pos=new Float32Array(cols*rows*3),col=new Float32Array(cols*rows*3),uv=new Float32Array(cols*rows*2),idx=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){

    const i=r*cols+c;

    pos[i*3]=(c/(cols-1)-.5)*physW;pos[i*3+1]=elev;pos[i*3+2]=(r/(rows-1)-.5)*physD;
    const t=(elev-eMin)/(eMax-eMin);

  const steep=new Float32Array(cols*rows),steepM=new Float32Array(cols*rows);
  function slopeAt(r,c,kr){
    const c1=Math.max(0,c-kr),c2=Math.min(cols-1,c+kr),r1=Math.max(0,r-kr),r2=Math.min(rows-1,r+kr);
    const dx=(rawHeights[r*cols+c2]-rawHeights[r*cols+c1])/((c2-c1)*cellM);
    const dz=(rawHeights[r2*cols+c]-rawHeights[r1*cols+c])/((r2-r1)*cellM);
    return Math.min(1.0,Math.atan(Math.sqrt(dx*dx+dz*dz))/(Math.PI/2));
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){steep[r*cols+c]=slopeAt(r,c,40);steepM[r*cols+c]=slopeAt(r,c,7);}

  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const i=r*cols+c,sl=steep[i];if(sl<0.82)continue;

    const zone=Math.max(0,Math.sin(tElev*Math.PI))*((sl-0.82)/0.18);
    const x=pos[i*3],z0=pos[i*3+2];
    const nz=(fbm2(x*0.006+2.1,z0*0.006+5.7,3)-0.5)*2.0;
    const disp=zone*MAX_OVHG*(0.5+0.5*(fbm2(x*0.003,z0*0.003+1.1,2)));

  const ridgeRaw=new Float32Array(cols*rows),cavityRaw=new Float32Array(cols*rows),ridgeSRaw=new Float32Array(cols*rows);
  const KR_R=20,KR_S=3;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const h00=rawHeights[r*cols+c];
    const c1=Math.max(0,c-KR_R),c2=Math.min(cols-1,c+KR_R),r1=Math.max(0,r-KR_R),r2=Math.min(rows-1,r+KR_R);

    const ssX=(s2-s1)*cellM/2,ssZ=(t2-t1)*cellM/2;
    const sd2x=(rawHeights[r*cols+s1]-2*h00+rawHeights[r*cols+s2])/(ssX*ssX);
    const sd2z=(rawHeights[t1*cols+c]-2*h00+rawHeights[t2*cols+c])/(ssZ*ssZ);

  for(let i=0;i<rows*cols;i++)ridge[i]=Math.min(1,ridgeRaw[i]/rP97);
  const cS=cavityRaw.slice().sort((a,b)=>a-b),cP97=cS[Math.floor(cS.length*0.97)]||1;
  const cavity=new Float32Array(cols*rows);
  for(let i=0;i<rows*cols;i++)cavity[i]=Math.min(1,cavityRaw[i]/cP97);
  const rSS=ridgeSRaw.slice().sort((a,b)=>a-b),rPS97=rSS[Math.floor(rSS.length*0.97)]||1;
  const ridgeS=new Float32Array(cols*rows);
  for(let i=0;i<rows*cols;i++)ridgeS[i]=Math.min(1,ridgeSRaw[i]/rPS97);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  g.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  g.setAttribute('aSteep',new THREE.BufferAttribute(steep,1));
  g.setAttribute('aSteepM',new THREE.BufferAttribute(steepM,1));
  g.setAttribute('aRidge',new THREE.BufferAttribute(ridge,1));
  g.setAttribute('aCavity',new THREE.BufferAttribute(cavity,1));
  g.setAttribute('aRidgeS',new THREE.BufferAttribute(ridgeS,1));
  g.setIndex(idx);g.computeVertexNormals();
  return g;
}

// ── Rock material ─────────────────────────────────────────────────────────────
function makeRockTexture(){

  function vnt(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);return h2t(ix,iy)*(1-u)*(1-v)+h2t(ix+1,iy)*u*(1-v)+h2t(ix,iy+1)*(1-u)*v+h2t(ix+1,iy+1)*u*v;}

    const macro=fbmt(x/260,y/260,4);
    const grain=fbmt(x/42,y/42,3,100,200);
    const fine=fbmt(x/14,y/14,2,300,400)*0.18;
    const biotRaw=fbmt(x/18,y/18,3,500,600);
    const biot=biotRaw>0.64?Math.pow((biotRaw-0.64)/0.36,0.5):0.0;
    const warpX=(vnt(x/90,y/90+100)-0.5)*60;
    const sy=(y+warpX*0.3)/S;
    const foliation=0.5+0.18*Math.sin((sy*6+fbmt(x/400,sy,2)*0.3)*Math.PI*2);
    const v=macro*0.38+grain*0.36+fine+foliation*0.08-biot*0.32;
    const b=0.38+Math.max(-0.16,Math.min(0.34,v-0.45));

function makeRockMaterial(rockTex){

      float _dBase=(_vn2v(position.xz*0.010)*0.52+_vn2v(position.xz*0.023)*0.30+_vn2v(position.xz*0.051)*0.18)-0.46;
      float _ledge=sin(position.y*0.26+(_vn2v(position.xz*0.013)-0.5)*3.0);
      _ledge=pow(max(0.0,_ledge),2.4)*0.60-0.10;
      float _dFine=(_vn2v(position.xz*0.082)*0.55+_vn2v(position.xz*0.165)*0.45)-0.38;
      float _dN=_dBase*0.52+_ledge*0.38+_dFine*0.10;
      transformed.x+=_wnW.x*_dN*_wStr*36.0;
      transformed.y+=max(0.0,_dN)*_wStr*11.0;`);
    shader.vertexShader=shader.vertexShader.replace('#include <worldpos_vertex>',`#include <worldpos_vertex>
      vWN=normalize(mat3(modelMatrix)*objectNormal);vWP=(modelMatrix*vec4(transformed,1.0)).xyz;
      vSteep=aSteep;vSteepM=aSteepM;vRidge=aRidge;vCavity=aCavity;vRidgeS=aRidgeS;`);
    shader.fragmentShader=`
varying vec3 vWN;varying vec3 vWP;varying float vSteep;varying float vSteepM;varying float vRidge;varying float vCavity;varying float vRidgeS;
uniform float rockScale;uniform float uShowRidge;
float _h21(vec2 p){p=fract(p*vec2(234.34,435.345));p+=dot(p,p+34.23);return fract(p.x*p.y);}
float _vn2(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);return mix(mix(_h21(i),_h21(i+vec2(1,0)),u.x),mix(_h21(i+vec2(0,1)),_h21(i+vec2(1,1)),u.x),u.y);}
float _fbm2(vec2 p){return 0.533*(_vn2(p)+0.5*_vn2(p*2.1)+0.25*_vn2(p*4.3)+0.125*_vn2(p*8.7));}
uniform sampler2D orthoTex;uniform float useOrtho;uniform float fullOrtho;
uniform sampler2D rockMaskTex;
`+shader.fragmentShader;
    shader.fragmentShader=shader.fragmentShader.replace('#include <map_fragment>',`
    vec3 tpW=abs(vWN);tpW=max(tpW-0.15,0.0);tpW=pow(tpW,vec3(3.0));tpW/=(tpW.x+tpW.y+tpW.z+1e-5);
    float _jit=(_fbm2(vWP.xz*0.00080)-0.5)*0.26+(_fbm2(vec2(vWP.x,vWP.y)*0.0020)-0.5)*0.13+(_fbm2(vec2(vWP.z,vWP.y)*0.0020)-0.5)*0.13;
    float blendSmooth=smoothstep(0.18,0.82,vSteep+_jit);
    float blendSharp=smoothstep(0.42,0.58,vSteepM+_jit*0.4);
    float edgeFactor=clamp((vSteepM-vSteep-0.06)*6.0,0.0,1.0);
    float wallBlend=clamp(mix(blendSmooth,blendSharp,edgeFactor),0.0,1.0);
    float sA=rockScale*0.22;float sMid=rockScale*0.55;
    vec2 _zyOff=vec2(_fbm2(vWP.xz*0.0013)*0.42-0.21, _fbm2(vWP.xz*0.0019+vec2(7.3,2.1))*0.42-0.21);
    vec3 rA=texture2D(map,vWP.xy*sA).rgb*tpW.z+texture2D(map,vWP.xz*sA).rgb*tpW.y+texture2D(map,(vWP.zy+_zyOff)*sA).rgb*tpW.x;
    vec3 rB=texture2D(map,vWP.xy*rockScale).rgb*tpW.z+texture2D(map,vWP.xz*rockScale).rgb*tpW.y+texture2D(map,(vWP.zy+_zyOff)*rockScale).rgb*tpW.x;
    vec3 rMid=texture2D(map,vWP.xy*sMid).rgb*tpW.z+texture2D(map,vWP.xz*sMid).rgb*tpW.y+texture2D(map,(vWP.zy+_zyOff)*sMid).rgb*tpW.x;
    vec3 rockSample=mix(2.0*rA*rB,1.0-2.0*(1.0-rA)*(1.0-rB),step(0.5,rA));
    float _mMid=dot(rMid,vec3(0.299,0.587,0.114));
    rockSample*=(0.72+_mMid*0.56);rockSample=clamp(rockSample,0.0,1.0);
    float _lum=dot(rockSample,vec3(0.299,0.587,0.114));
    rockSample=mix(rockSample, rockSample*vec3(1.12,0.97,0.91), smoothstep(0.38,0.72,_lum)*0.52);
    rockSample=mix(rockSample, rockSample*vec3(0.94,0.96,1.04), smoothstep(0.66,0.88,_lum)*0.30);
    float _bioN=_vn2(vWP.xz*rockScale*14.0)*0.6+_vn2(vWP.xz*rockScale*7.3)*0.4;
    float _bio=smoothstep(0.82,0.96,_bioN)*smoothstep(0.52,0.30,_lum);
    rockSample=mix(rockSample, vec3(0.08,0.07,0.06), _bio*0.85);
    rockSample*=vec3(0.91,0.91,0.93);rockSample=clamp(rockSample,0.0,1.0);
    if(useOrtho>0.5){
      vec2 uv2=vUv;
      float fx=smoothstep(0.0,0.04,uv2.x)*smoothstep(1.0,0.96,uv2.x);
      float fy=smoothstep(0.0,0.04,uv2.y)*smoothstep(1.0,0.96,uv2.y);
      float slopeFade=mix(mix(0.34,1.0,smoothstep(0.97,0.60,wallBlend)),1.0,fullOrtho);
      float maskRock=texture2D(rockMaskTex,clamp(uv2,0.001,0.999)).r*(1.0-fullOrtho);
      float blend=fx*fy*0.95*slopeFade*(1.0-maskRock*0.45);
      vec3 orthoSample=texture2D(orthoTex,clamp(uv2,0.001,0.999)).rgb;
      diffuseColor.rgb=mix(rockSample,orthoSample,blend);
    }else{
      diffuseColor.rgb=rockSample;
    }
    {float _wStr=smoothstep(0.55,0.90,wallBlend)*0.55;diffuseColor.rgb=mix(diffuseColor.rgb, diffuseColor.rgb*vec3(0.70,0.71,0.73), _wStr);}
    {float _ao=1.0-vCavity*0.62;diffuseColor.rgb*=_ao;}
    {diffuseColor.rgb=mix(diffuseColor.rgb, diffuseColor.rgb*vec3(1.08,1.07,1.06), vRidgeS*0.45);}
    `);
    shader.fragmentShader=shader.fragmentShader.replace('#include <normal_fragment_maps>',`#include <normal_fragment_maps>
    if(wallBlend>0.01){vec3 _L=vec3(0.299,0.587,0.114);
      float _bE=rockScale*0.90;float _bS=wallBlend*3.0;
      float _h=dot(texture2D(map,vWP.xy*rockScale).rgb,_L);
      vec3 _bXY=vec3(_h-dot(texture2D(map,(vWP.xy+vec2(_bE,0))*rockScale).rgb,_L),_h-dot(texture2D(map,(vWP.xy+vec2(0,_bE))*rockScale).rgb,_L),0.0);
      _h=dot(texture2D(map,vWP.xz*rockScale).rgb,_L);
      vec3 _bXZ=vec3(_h-dot(texture2D(map,(vWP.xz+vec2(_bE,0))*rockScale).rgb,_L),0.0,_h-dot(texture2D(map,(vWP.xz+vec2(0,_bE))*rockScale).rgb,_L));
      _h=dot(texture2D(map,(vWP.zy+_zyOff)*rockScale).rgb,_L);
      vec3 _bZY=vec3(0.0,_h-dot(texture2D(map,(vWP.zy+_zyOff+vec2(0,_bE))*rockScale).rgb,_L),_h-dot(texture2D(map,(vWP.zy+_zyOff+vec2(_bE,0))*rockScale).rgb,_L));
      vec3 fineBump=(_bXY*tpW.z+_bXZ*tpW.y+_bZY*tpW.x)*_bS;
      normal=normalize(normal+mat3(viewMatrix)*fineBump);}
    `);
    shader.fragmentShader=shader.fragmentShader.replace('#include <roughnessmap_fragment>',`#include <roughnessmap_fragment>
    roughnessFactor=clamp(roughnessFactor*(0.70+0.20*abs(vWN.y)),0.73,1.00);
    roughnessFactor=mix(roughnessFactor, 0.28, smoothstep(0.60,0.94,wallBlend)*0.68);
    roughnessFactor=mix(roughnessFactor, 0.60, vRidgeS*0.30);`);
  };
  return mat;
}

// ── Rysunki topo (read-only) ───────────────────────────────────────────────────
function makeLabel(text, position, lColor, lSize) {
  lColor = lColor || '#ffffff'; lSize = lSize || 32;
  const STRETCH = 1.38;
  const cv = document.createElement('canvas');
  const padding = Math.ceil(lSize * 0.15);
  const ctx = cv.getContext('2d');
  ctx.font = `bold ${lSize}px sans-serif`;
  const tw = ctx.measureText(text).width;
  cv.width  = Math.ceil(tw * STRETCH) + padding * 2;
  cv.height = Math.ceil(lSize * 1.3);
  ctx.font = `bold ${lSize}px sans-serif`;
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = Math.ceil(lSize * 0.18);
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  ctx.fillStyle = lColor; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.save();
  ctx.scale(STRETCH, 1.0);
  ctx.fillText(text, padding / STRETCH, Math.ceil(lSize * 0.1));
  ctx.restore();
  const tex = new THREE.CanvasTexture(cv);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
  spr.position.copy(position);
  spr.center.set(0.5, 0);  // anchor u dołu — tekst rośnie w górę, brak kółka
  const scale = lSize / 32;
  spr.scale.set((cv.width / 90) * 9 * scale, 9 * scale, 1);
  return spr;
}

let allSprites = [];

function loadDrawingsFromData(data) {
  (data.lines || []).forEach(ld => {
    const pts = [];
    for (let i = 0; i < ld.pts.length; i += 3)
      pts.push(new THREE.Vector3(ld.pts[i], ld.pts[i+1], ld.pts[i+2]));
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: ld.color, depthTest: false })));
    if (ld.label) {
      const lp = pts[Math.floor(pts.length/2)].clone(); lp.y += 5;
      const s = makeLabel(ld.label, lp, ld.labelColor||ld.color, ld.labelSize||32);
      scene.add(s); allSprites.push(s);
    }
  });
  (data.markers || []).forEach(md => {
    if (!md.label) return;  // brak etykiety — pomijamy całkowicie
    const pos = new THREE.Vector3(...md.pos);
    const lp = pos.clone(); lp.y += 6;
    const s = makeLabel(md.label, lp, md.labelColor||md.color, md.labelSize||32);
    scene.add(s); allSprites.push(s);
  });
}

// ── Słońce ────────────────────────────────────────────────────────────────────
function updateSun() {
  const dateStr = document.getElementById('date-in').value;
  const h = parseFloat(document.getElementById('hour-in').value);
  const hh = String(Math.floor(h)).padStart(2,'0');
  const mm = String(Math.round((h%1)*60)).padStart(2,'0');
  document.getElementById('hour-disp').textContent = `${hh}:${mm}`;
  const dt = new Date(`${dateStr}T12:00:00`);
  dt.setHours(Math.floor(h), Math.round((h%1)*60), 0, 0);
  const pos = SunCalc.getPosition(dt, LAT, LNG);
  const alt = pos.altitude, az = pos.azimuth;
  const _sx=-Math.sin(az)*Math.cos(alt), _sy=Math.sin(alt), _sz=Math.cos(az)*Math.cos(alt);
  sunLight.position.set(_sx*10000, _sy*10000, _sz*10000);
  if (sunMesh) {
    sunMesh.position.set(_sx*8500, _sy*8500, _sz*8500);
    sunMesh.visible = alt > -0.04;
    const _t = Math.min(1, Math.max(0, alt / 0.20));
    sunMesh.material.color.setRGB(1.0, 0.50 + _t*0.44, 0.10 + _t*0.68);
  }
  sunLight.shadow.camera.updateProjectionMatrix();
  if (sky) { const su=sky.material.uniforms; su['sunPosition'].value.set(_sx,_sy,_sz); }
  const fmt = t => { const d=new Date(t); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  const times = SunCalc.getTimes(dt, LAT, LNG);
  document.getElementById('v-rise').textContent = fmt(times.sunrise);
  document.getElementById('v-set').textContent  = fmt(times.sunset);
  if (alt < -0.12) {
    ambientLight.intensity=0.06; ambientLight.color.setHex(0x0d1530); sunLight.intensity=0;
    scene.background=new THREE.Color(0x04060e); scene.fog.color.setHex(0x04060e);
    document.getElementById('sun-label').textContent='🌙 Noc'; document.getElementById('sun-label').style.color='#7799ff';
  } else if (alt < 0.18) {
    const t=(alt+.12)/.30; ambientLight.intensity=0.06+t*.28;
    ambientLight.color.setRGB(.15+t*.1,.18+t*.1,.35+t*.05);
    sunLight.intensity=Math.max(0,t*1.6); sunLight.color.setRGB(1,.45+t*.45,.15+t*.70);
    scene.background=new THREE.Color(.06+t*.08,.05+t*.06,.09+t*.12); scene.fog.color.copy(scene.background);
    document.getElementById('sun-label').textContent=alt>0?'🌅 Złota godzina':'🌆 Zmierzch'; document.getElementById('sun-label').style.color='#ffaa44';
  } else {
    const t=Math.min(1,(alt-.18)/.5); ambientLight.intensity=0.55+t*.25;
    ambientLight.color.setRGB(.5+t*.2,.55+t*.2,.75+t*.1);
    sunLight.intensity=0.9+t*.5; sunLight.color.setHex(0xfff5dd);
    scene.background=new THREE.Color(.14+t*.2,.18+t*.22,.32+t*.25); scene.fog.color.copy(scene.background);
    document.getElementById('sun-label').textContent='☀ Dzień'; document.getElementById('sun-label').style.color='#ffdd88';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
function loadImg(src) {
  return new Promise((res,rej) => { const img=new Image();img.crossOrigin='anonymous';img.onload=()=>res(img);img.onerror=rej;img.src=src; });
}

async function init() {
  meta = await fetch('dem/koscielec_meta.json').then(r => r.json());

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a2030, 0.00025);
  scene.background = new THREE.Color(0x1a2535);

  camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 1, 60000);
  ambientLight = new THREE.AmbientLight(0x6080a0, 0.85); scene.add(ambientLight);
  scene.add(new THREE.HemisphereLight(0x90aad0, 0x404030, 0.70));
  sunLight = new THREE.DirectionalLight(0xfff5dd, 1.6);
  sunLight.castShadow = true; sunLight.shadow.mapSize.set(4096, 4096);
  sunLight.shadow.bias = -0.0004; sunLight.shadow.normalBias = 0.025;
  sunLight.position.set(-3000, 5000, 2000); scene.add(sunLight);
  sunMesh = new THREE.Mesh(
    new THREE.SphereGeometry(95, 20, 20),
    new THREE.MeshBasicMaterial({ color: 0xffee88, fog: false })
  );
  scene.add(sunMesh);

  const img = await loadImg('dem/koscielec_terrain_rgb.png');
  physW = img.width * meta.res_m;
  physD = img.height * meta.res_m;

  const geo = buildGeometry(img);
  const mat = makeRockMaterial(makeRockTexture());
  currentMesh = new THREE.Mesh(geo, mat);
  currentMesh.receiveShadow = true; currentMesh.castShadow = true;
  scene.add(currentMesh);

  // Physical sky (Preetham)
  try {
    sky = new THREE.Sky(); sky.scale.setScalar(450000); scene.add(sky);
    const su = sky.material.uniforms;
    su['turbidity'].value=3.5; su['rayleigh'].value=0.8;
    su['mieCoefficient'].value=0.004; su['mieDirectionalG'].value=0.92;
    scene.background = null;
  } catch(e) {}

  // Post-processing: vignette + kontrast + glow
  try {
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    composer.addPass(new THREE.ShaderPass({
      uniforms: { tDiffuse:{value:null} },
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
      fragmentShader:`uniform sampler2D tDiffuse;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);c.rgb=pow(max(c.rgb,0.0),vec3(0.92));c.rgb=mix(vec3(dot(c.rgb,vec3(0.299,0.587,0.114))),c.rgb,1.12);float lum=dot(c.rgb,vec3(0.299,0.587,0.114));c.rgb+=c.rgb*smoothstep(0.72,1.0,lum)*0.18;float d=length(vUv-0.5)*1.42;c.rgb*=1.0-smoothstep(0.40,0.90,d)*0.55;gl_FragColor=c;}`
    }));
  } catch(e) { composer=null; }

  const sc = sunLight.shadow.camera;
  const mg = 0.2;
  Object.assign(sc, { left:-(physW/2)*(1+mg*2), right:(physW/2)*(1+mg*2), top:(physD/2)*(1+mg*2), bottom:-(physD/2)*(1+mg*2), near:1, far:16000 });
  sc.updateProjectionMatrix();

  const baseY = meta.elev_min;
  camera.position.set(323.6, 2078.7, -42.0);
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(39.3, 2023.0, 75.7);
  controls.enableDamping = true; controls.dampingFactor = 0.07;
  controls.maxPolarAngle = Math.PI * 0.88;
  controls.update();

  const _loadTex = (url, cb) => {
    new THREE.TextureLoader().load(url, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.generateMipmaps = true;
      tex.minFilter = THREE.LinearMipmapLinearFilter;
      tex.magFilter = THREE.LinearFilter;
      cb(tex);
    });
  };
  let rockMaskTex = null;
  _loadTex('dem/koscielec_orto.jpg', tex => { orthoTex = tex; });
  _loadTex('dem/koscielec_rock_mask.png', tex => { rockMaskTex = tex; });
  (function waitOrtho() {
    if (shaderUniforms && orthoTex) {
      shaderUniforms.orthoTex.value    = orthoTex;
      shaderUniforms.useOrtho.value    = 1.0;
      if (rockMaskTex) shaderUniforms.rockMaskTex.value = rockMaskTex;
    } else { requestAnimationFrame(waitOrtho); }
  })();

  // auto-load rysunki topo
  fetch('koscielec_drawings.json?_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(loadDrawingsFromData)
    .catch(() => {});

  document.getElementById('loading').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  const today = new Date();
  document.getElementById('date-in').value = today.toISOString().split('T')[0];
  try {
    const times = SunCalc.getTimes(today, LAT, LNG);
    const ghMid = new Date((times.sunrise.getTime() + times.goldenHourEnd.getTime()) / 2);
    document.getElementById('hour-in').value = (ghMid.getHours() + ghMid.getMinutes()/60).toFixed(2);
  } catch(e) { document.getElementById('hour-in').value = 7.0; }
  updateSun();
  document.getElementById('date-in').addEventListener('input', updateSun);
  document.getElementById('hour-in').addEventListener('input', updateSun);
  document.getElementById('sun-toggle').addEventListener('change', e => { sunLight.visible = e.target.checked; });
  document.getElementById('labels-toggle').addEventListener('change', e => { allSprites.forEach(s => s.visible = e.target.checked); });
  document.getElementById('orto-toggle').addEventListener('change', e => {
    if (!shaderUniforms) return;
    if (e.target.checked && orthoTex) {
      shaderUniforms.orthoTex.value = orthoTex;
      shaderUniforms.useOrtho.value = 1.0;
    } else {
      shaderUniforms.useOrtho.value = 0.0;
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (composer) composer.setSize(window.innerWidth, window.innerHeight);
  });

  proj4.defs('EPSG:2180', '+proj=tmerc +lat_0=0 +lon_0=19 +k=0.9993 +x_0=500000 +y_0=-5300000 +ellps=GRS80 +units=m +no_defs');
  function sceneTo1992(sceneX, sceneZ) {
    const b = meta.bounds_wgs84;
    const lon = b.west  + (sceneX / physW + 0.5) * (b.east  - b.west);
    const lat = b.north - (sceneZ / physD + 0.5) * (b.north - b.south);
    const r = proj4('EPSG:4326', 'EPSG:2180', [lon, lat]);
    return [r[1], r[0]]; // PUWG: X=northing, Y=easting
  }
  const _coX = document.getElementById('co-x'), _coY = document.getElementById('co-y'), _coH = document.getElementById('co-h');
  (function animate() {
    requestAnimationFrame(animate);
    controls.update();
    if(composer) composer.render(); else renderer.render(scene, camera);
    const t = controls.target;
    const [tX, tY] = sceneTo1992(t.x, t.z);
    _coX.textContent = Math.round(tX); _coY.textContent = Math.round(tY); _coH.textContent = t.y.toFixed(0);
  })();
}

init().catch(console.error);
</script>
