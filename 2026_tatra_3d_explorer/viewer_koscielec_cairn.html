<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kościelec – Cairn</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111318; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #ccc; }
canvas#c { display: block; width: 100vw; height: 100vh; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 15px; color: #666; letter-spacing: 2px; text-align: center; line-height: 1.8; }
#help { position: absolute; bottom: 16px; left: 16px;
  font-size: 10px; color: rgba(255,255,255,0.24); line-height: 2; }
#info { position: absolute; top: 16px; left: 16px;
  font-size: 10px; color: rgba(255,255,255,0.28); line-height: 1.9; letter-spacing: 0.8px; }
#ui {
  position: absolute; top: 16px; right: 16px;
  background: rgba(6,8,16,0.90); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px; padding: 16px; width: 220px;
  backdrop-filter: blur(10px); display: none;
}
#ui h1 { font-size: 12px; letter-spacing: 2.5px; color: #999; text-transform: uppercase; margin-bottom: 14px; }
.sep { font-size: 10px; letter-spacing: 1.5px; color: #666; text-transform: uppercase;
       margin: 14px 0 8px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
.field { margin-bottom: 9px; }
.field label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 4px; }
.field label b { color: #ffd; }
input[type=date], input[type=range] {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); color: #ccc;
  padding: 5px 8px; border-radius: 6px; font-size: 12px; outline: none;
}
input[type=range] { padding: 2px 0; cursor: pointer; accent-color: #f90; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
#sun-label { font-size: 11px; text-align: center; padding: 4px 8px; margin: 4px 0 6px;
  background: rgba(255,255,255,0.04); border-radius: 6px; }
#times { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; }
#times span { color: #888; } #times b { color: #ffd; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
.toggle-row span { font-size: 11px; color: #888; }
.toggle { position: relative; display: inline-block; width: 38px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider-toggle { position: absolute; cursor: pointer; inset: 0;
  background: rgba(255,255,255,0.1); border-radius: 20px; transition: 0.2s; }
.slider-toggle:before { content: ''; position: absolute; height: 14px; width: 14px;
  left: 3px; bottom: 3px; background: #888; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .slider-toggle { background: rgba(80,200,120,0.4); }
.toggle input:checked + .slider-toggle:before { transform: translateX(18px); background: #8de; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">KOŚCIELEC · CAIRN…</div>
<div id="info">KOŚCIELEC · CAIRN<br>uproszczona rzeźba kątowa</div>
<div id="help">Lewy: obracanie &nbsp;·&nbsp; Prawy/środkowy: przesuwanie &nbsp;·&nbsp; Scroll: zoom</div>

<div id="ui">
  <h1>Kościelec · Cairn</h1>
  <div class="sep">☀ Pozycja słońca</div>
  <div class="field">
    <label>Data</label>
    <input type="date" id="date-in">
  </div>
  <div class="field">
    <label><span>Godzina</span><b id="hour-disp">12:00</b></label>
    <input type="range" id="hour-in" min="0" max="24" step="0.25" value="12">
  </div>
  <div id="times">
    <div><span>↑ </span><b id="v-rise">–</b></div>
    <div><b id="v-set">–</b><span> ↓</span></div>
  </div>
  <div id="sun-label">–</div>
  <div class="toggle-row" style="margin-top:6px">
    <span>Światło słońca</span>
    <label class="toggle">
      <input type="checkbox" id="sun-toggle" checked>
      <span class="slider-toggle"></span>
    </label>
  </div>
  <div class="sep">🏷 Etykiety</div>
  <div class="toggle-row">
    <span>Pokaż etykiety</span>
    <label class="toggle">
      <input type="checkbox" id="labels-toggle" checked>
      <span class="slider-toggle"></span>
    </label>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
<script src="lib/three.min.js"></script>
<script src="lib/OrbitControls.js"></script>
<script>
const STEP = 8;          // gruby siatka → kanciasty wygląd
const LAT = 49.2254, LNG = 20.0155;

let scene, camera, renderer, controls;
let sunLight, ambientLight, sunMesh;
let edgeLines;
let meta, physW, physD;
let allSprites = [];

// ── Noise (do displacement) ────────────────────────────────────────────────
function h2(x,y){let n=(((x&0xfff)*1619)^((y&0xfff)*31337))>>>0;n=((n>>13)^n)>>>0;n=(((n*(((n*n*60493)>>>0)+19990303))>>>0)+1376312589)>>>0;return(n&0xffff)/65535;}
function vn2(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);return h2(ix,iy)*(1-u)*(1-v)+h2(ix+1,iy)*u*(1-v)+h2(ix,iy+1)*(1-u)*v+h2(ix+1,iy+1)*u*v;}

// ── Kolor wierzchołka (gradient wysokościowy) ──────────────────────────────
function cairnColor(t) {
  // t = znormalizowana wysokość 0–1
  // doliny: chłodny ciemniejszy szary → szczyty: ciepły jasny
  const r = 0.40 + t * 0.36;
  const g = 0.40 + t * 0.35;
  const b = 0.44 + t * 0.28;
  return [r, g, b];
}

// ── Budowa geometrii DEM ───────────────────────────────────────────────────
function buildGeometry(img) {
  const cv = document.createElement('canvas');
  cv.width = img.width; cv.height = img.height;
  cv.getContext('2d').drawImage(img, 0, 0);
  const px = cv.getContext('2d').getImageData(0, 0, img.width, img.height).data;
  const fW = img.width, fH = img.height;
  const cols = Math.floor(fW / STEP), rows = Math.floor(fH / STEP);
  const eMin = meta.elev_min, eMax = meta.elev_max;
  const cellM = physW / (cols - 1);

  const rawH = new Float32Array(cols * rows);
  const pos  = new Float32Array(cols * rows * 3);
  const col  = new Float32Array(cols * rows * 3);
  const uv   = new Float32Array(cols * rows * 2);
  const idx  = [];

  // Pass 1 – pozycje i kolory
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const pi  = (r * STEP * fW + c * STEP) * 4;
      const elev = -10000 + (px[pi]*65536 + px[pi+1]*256 + px[pi+2]) * 0.1;
      const i   = r * cols + c;
      rawH[i] = elev;
      pos[i*3]   = (c/(cols-1) - 0.5) * physW;
      pos[i*3+1] = elev;
      pos[i*3+2] = (r/(rows-1) - 0.5) * physD;
      const [cr,cg,cb] = cairnColor((elev-eMin)/(eMax-eMin));
      col[i*3]=cr; col[i*3+1]=cg; col[i*3+2]=cb;
      uv[i*2]=c/(cols-1); uv[i*2+1]=1-r/(rows-1);
      if (r < rows-1 && c < cols-1) {
        const a=i, b=i+1, d=i+cols, e=i+cols+1;
        idx.push(a,d,b, b,d,e);
      }
    }
  }

  // Pass 2 – stromość → lekkie dodatkowe przemieszczenie pionowe na zboczach
  // (uwypukla kanciastość przez akcentowanie zmian terenu)
  function slopeAt(r, c, kr) {
    const c1=Math.max(0,c-kr),c2=Math.min(cols-1,c+kr);
    const r1=Math.max(0,r-kr),r2=Math.min(rows-1,r+kr);
    const dx=(rawH[r*cols+c2]-rawH[r*cols+c1])/((c2-c1)*cellM);
    const dz=(rawH[r2*cols+c]-rawH[r1*cols+c])/((r2-r1)*cellM);
    return Math.min(1.0, Math.atan(Math.sqrt(dx*dx+dz*dz))/(Math.PI/2));
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const i = r * cols + c;
      const sl = slopeAt(r, c, 3);
      // na stromych zboczach — lekki szum kanciasty (podkreśla grzbiety)
      const x0 = pos[i*3], z0 = pos[i*3+2];
      const nz = (vn2(x0*0.008+3.1, z0*0.008+7.3) - 0.5);
      pos[i*3+1] += nz * sl * 12;
    }
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  g.setAttribute('uv',       new THREE.BufferAttribute(uv,  2));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}

// ── Etykiety (topo overlay) ────────────────────────────────────────────────
function makeLabel(text, position, lColor, lSize) {
  lColor = lColor || '#ffffff'; lSize = lSize || 32;
  const STRETCH = 1.38;
  const cv = document.createElement('canvas');
  const padding = Math.ceil(lSize * 0.15);
  const ctx = cv.getContext('2d');
  ctx.font = `bold ${lSize}px sans-serif`;
  const tw = ctx.measureText(text).width;
  cv.width  = Math.ceil(tw * STRETCH) + padding * 2;
  cv.height = Math.ceil(lSize * 1.3);
  ctx.font = `bold ${lSize}px sans-serif`;
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = Math.ceil(lSize * 0.18);
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  ctx.fillStyle = lColor; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.save();
  ctx.scale(STRETCH, 1.0);
  ctx.fillText(text, padding / STRETCH, Math.ceil(lSize * 0.1));
  ctx.restore();
  const tex = new THREE.CanvasTexture(cv);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
  spr.position.copy(position);
  spr.center.set(0.5, 0);
  const scale = lSize / 32;
  spr.scale.set((cv.width / 90) * 9 * scale, 9 * scale, 1);
  return spr;
}

function loadDrawingsFromData(data) {
  (data.lines || []).forEach(ld => {
    const pts = [];
    for (let i = 0; i < ld.pts.length; i += 3)
      pts.push(new THREE.Vector3(ld.pts[i], ld.pts[i+1], ld.pts[i+2]));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: ld.color, depthTest: false })
    ));
    if (ld.label) {
      const lp = pts[Math.floor(pts.length/2)].clone(); lp.y += 5;
      const s = makeLabel(ld.label, lp, ld.labelColor||ld.color, ld.labelSize||32);
      scene.add(s); allSprites.push(s);
    }
  });
  (data.markers || []).forEach(md => {
    if (!md.label) return;
    const lp = new THREE.Vector3(...md.pos); lp.y += 5;
    const s = makeLabel(md.label, lp, md.labelColor||md.color, md.labelSize||32);
    scene.add(s); allSprites.push(s);
  });
}

// ── Słońce ─────────────────────────────────────────────────────────────────
function updateSun() {
  const dateStr = document.getElementById('date-in').value;
  const h = parseFloat(document.getElementById('hour-in').value);
  const hh = String(Math.floor(h)).padStart(2,'0');
  const mm = String(Math.round((h%1)*60)).padStart(2,'0');
  document.getElementById('hour-disp').textContent = `${hh}:${mm}`;
  const dt = new Date(`${dateStr}T12:00:00`);
  dt.setHours(Math.floor(h), Math.round((h%1)*60), 0, 0);
  const pos = SunCalc.getPosition(dt, LAT, LNG);
  const alt = pos.altitude, az = pos.azimuth;
  const sx=-Math.sin(az)*Math.cos(alt), sy=Math.sin(alt), sz=Math.cos(az)*Math.cos(alt);
  sunLight.position.set(sx*10000, sy*10000, sz*10000);
  if (sunMesh) {
    sunMesh.position.set(sx*8500, sy*8500, sz*8500);
    sunMesh.visible = alt > -0.04;
    const _t = Math.min(1, Math.max(0, alt / 0.20));
    sunMesh.material.color.setRGB(1.0, 0.50+_t*0.44, 0.10+_t*0.68);
  }
  sunLight.shadow.camera.updateProjectionMatrix();
  const fmt = t => { const d=new Date(t); return isNaN(d)?'–':String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  const times = SunCalc.getTimes(dt, LAT, LNG);
  document.getElementById('v-rise').textContent = fmt(times.sunrise);
  document.getElementById('v-set').textContent  = fmt(times.sunset);
  if (alt < -0.12) {
    ambientLight.intensity=0.04; ambientLight.color.setHex(0x0d1530); sunLight.intensity=0;
    scene.background=new THREE.Color(0x04060e); scene.fog.color.setHex(0x04060e);
    document.getElementById('sun-label').textContent='🌙 Noc'; document.getElementById('sun-label').style.color='#7799ff';
  } else if (alt < 0.18) {
    const t=(alt+.12)/.30; ambientLight.intensity=0.04+t*.20;
    ambientLight.color.setRGB(.10+t*.08,.12+t*.08,.28+t*.04);
    sunLight.intensity=Math.max(0,t*2.0); sunLight.color.setRGB(1,.45+t*.45,.15+t*.70);
    scene.background=new THREE.Color(.05+t*.06,.04+t*.05,.08+t*.10); scene.fog.color.copy(scene.background);
    document.getElementById('sun-label').textContent=alt>0?'🌅 Złota godzina':'🌆 Zmierzch'; document.getElementById('sun-label').style.color='#ffaa44';
  } else {
    const t=Math.min(1,(alt-.18)/.5); ambientLight.intensity=0.28+t*.15;
    ambientLight.color.setRGB(.30+t*.15,.34+t*.15,.58+t*.10);
    sunLight.intensity=1.6+t*.6; sunLight.color.setHex(0xfff5dd);
    scene.background=new THREE.Color(.10+t*.14,.12+t*.16,.22+t*.20); scene.fog.color.copy(scene.background);
    document.getElementById('sun-label').textContent='☀ Dzień'; document.getElementById('sun-label').style.color='#ffffaa';
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function loadImg(src) {
  return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>res(img);img.onerror=rej;img.src=src;});
}

async function init() {
  meta = await fetch('dem/koscielec_meta.json').then(r => r.json());

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x111318, 0.00022);
  scene.background = new THREE.Color(0x111318);

  camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 1, 60000);

  // Oświetlenie mocno kontrastowe (styl Cairn: ostre cienie, ciemne ściany)
  ambientLight = new THREE.AmbientLight(0x3050a0, 0.30); scene.add(ambientLight);
  scene.add(new THREE.HemisphereLight(0x7088c0, 0x20202c, 0.25));
  sunLight = new THREE.DirectionalLight(0xfff5dd, 2.0);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(4096, 4096);
  sunLight.shadow.bias = -0.0004; sunLight.shadow.normalBias = 0.025;
  sunLight.position.set(-3000, 5000, 2000); scene.add(sunLight);
  sunMesh = new THREE.Mesh(
    new THREE.SphereGeometry(95, 20, 20),
    new THREE.MeshBasicMaterial({ color: 0xffee88, fog: false })
  );
  scene.add(sunMesh);

  const img = await loadImg('dem/koscielec_terrain_rgb.png');
  physW = img.width  * meta.res_m;
  physD = img.height * meta.res_m;

  const geo = buildGeometry(img);

  // Material: flatShading = kanciasty, matte, vertex colors
  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    flatShading: true,
    roughness: 0.94,
    metalness: 0.0,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true; mesh.castShadow = true;
  scene.add(mesh);

  // Linie strukturalne: krawędzie między ścianami >18° (grzbiety, doliny, uskoki)
  const edgesGeo = new THREE.EdgesGeometry(geo, 18);
  edgeLines = new THREE.LineSegments(
    edgesGeo,
    new THREE.LineBasicMaterial({ color: 0x14161e, transparent: true, opacity: 0.82 })
  );
  scene.add(edgeLines);

  const sc = sunLight.shadow.camera;
  const mg = 0.2;
  Object.assign(sc, {
    left:-(physW/2)*(1+mg*2), right:(physW/2)*(1+mg*2),
    top:(physD/2)*(1+mg*2), bottom:-(physD/2)*(1+mg*2),
    near:1, far:16000
  });
  sc.updateProjectionMatrix();

  camera.position.set(323.6, 2078.7, -42.0);
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(39.3, 2023.0, 75.7);
  controls.enableDamping = true; controls.dampingFactor = 0.07;
  controls.maxPolarAngle = Math.PI * 0.88;
  controls.update();

  // Auto-load rysunki topo
  fetch('koscielec_drawings.json?_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(loadDrawingsFromData)
    .catch(() => {});

  document.getElementById('loading').style.display = 'none';
  document.getElementById('ui').style.display = 'block';

  document.getElementById('date-in').value = new Date().toISOString().split('T')[0];
  updateSun();
  document.getElementById('date-in').addEventListener('input', updateSun);
  document.getElementById('hour-in').addEventListener('input', updateSun);
  document.getElementById('sun-toggle').addEventListener('change', e => { sunLight.visible = e.target.checked; });
  document.getElementById('labels-toggle').addEventListener('change', e => {
    allSprites.forEach(s => { s.visible = e.target.checked; });
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  (function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  })();
}

init();
</script>
</body>
</html>
